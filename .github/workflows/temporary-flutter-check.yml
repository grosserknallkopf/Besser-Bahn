name: Temporary Flutter check

on:
  push:
    branches:
      - agent/background-exit-alarm-ci

jobs:
  flutter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'
          channel: stable
          cache: true
      - working-directory: flutter-app
        run: flutter pub get
      - working-directory: flutter-app
        run: flutter analyze --no-fatal-infos
      - working-directory: flutter-app
        run: >-
          flutter test
          test/exit_alarm_intelligence_test.dart
          test/missed_connection_test.dart
      - working-directory: flutter-app
        run: flutter build apk --debug
