# Local run / Dokploy Compose deploy.
#   docker compose up --build
# Dokploy: point a Compose service at this repo, or just deploy the Dockerfile
# directly (Application -> Build type: Dockerfile).
services:
  prediction-api:
    build: .
    image: besserbahn-predict:latest
    ports:
      - "8000:8000"
    environment:
      # Per-IP rate limits — tune for your traffic. The model is cheap; these
      # are abuse guards, not capacity limits.
      RATE_LIMIT: "60/minute"
      GLOBAL_RATE_LIMIT: "5000/hour"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health',timeout=5).status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
