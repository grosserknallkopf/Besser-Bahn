name: besser_bahn
description: "Die bessere Bahn-App. Privacy-first, für Vielfahrer."
publish_to: 'none'

version: 2.0.4+5

environment:
  sdk: ^3.11.0
  flutter: 3.41.9   # exact: IzzyOnDroid RB parses this line and clones `flutter -b <version>`. Bump on every release to the Flutter version you actually build with.

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.3.1
  go_router: ^17.2.3
  http: ^1.6.0
  url_launcher: ^6.3.2
  share_plus: ^13.1.0            # system share sheet for "Reise teilen" links
  flutter_map: ^8.3.0
  latlong2: ^0.9.1
  libre_location: ^0.4.1        # GMS-free GPS ("Mein Standort"); pure AOSP LocationManager
  intl: ^0.20.2
  shared_preferences: ^2.3.4
  path_provider: ^2.1.5          # on-disk cache for static OSM platform geometry
  flutter_svg: ^2.3.0
  flutter_web_auth_2: ^5.0.2     # OAuth2 browser flow (Träwelling)
  flutter_secure_storage: ^10.3.1 # access/refresh token storage
  crypto: ^3.0.7                 # PKCE code challenge (SHA-256) + tile-cache keys
  flutter_local_notifications: ^21.0.0  # "Split-Ticket fertig" OS notification
  timezone: ^0.11.0              # tz-aware scheduling for trip reminders
  flutter_timezone: ^5.1.0       # device local time zone for zonedSchedule
  # Pinned: 10.x is a GPU/flutter_scene beta rewrite that drops sprite support
  # and rearchitects the layer — not worth the instability for the Karte tab.
  vector_map_tiles: 9.0.0-beta.8
  connectivity_plus: ^7.1.1      # offline detection → offline banner / cached-data mode
  webview_flutter: ^4.10.0       # render DB's official Handyticket HTML offline
  webview_flutter_android: ^4.0.0  # platform tweaks (hide native scrollbar)
  device_info_plus: ^13.1.0      # real Android model + SDK level for DB Navigator-shaped headers

# Force-bump transitives our direct deps pin too low. Each is API-compatible
# with the held version (LatLng / xml AST / image API), so the override is
# safe; the few that would actually break (protobuf 3→6, vector_tile 2→4) are
# deliberately NOT overridden.
dependency_overrides:
  latlong2: ^0.10.1
  xml: ^7.0.1
  image: ^4.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

# Flutter launcher icons configuration
flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path_android: "assets/icon/app_icon.png"
  image_path_ios: "assets/icon/app_icon.png"
  adaptive_icon_background: "#EC0016"
  adaptive_icon_foreground: "assets/icon/app_icon.png"
  adaptive_icon_monochrome: "assets/icon/app_icon_monochrome.png"
  web:
    generate: false
  windows:
    generate: false
  macos:
    generate: false

flutter:
  uses-material-design: true

  assets:
    - assets/icon/
    - assets/traewelling/
