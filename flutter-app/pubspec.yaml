name: besser_bahn
description: "Die bessere Bahn-App. Privacy-first, für Vielfahrer."
publish_to: 'none'

version: 2.0.0+1

environment:
  sdk: ^3.10.0
  flutter: ^3.35.3

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.3.1
  go_router: ^17.2.3
  http: ^1.6.0
  url_launcher: ^6.3.2
  share_plus: ^11.0.0            # system share sheet for "Reise teilen" links
  flutter_map: ^8.3.0
  latlong2: ^0.9.1
  geolocator: ^14.0.0           # device GPS for "Mein Standort" on the map
  intl: ^0.20.2
  shared_preferences: ^2.3.4
  flutter_svg: ^2.3.0
  flutter_web_auth_2: ^5.0.2     # OAuth2 browser flow (Träwelling)
  flutter_secure_storage: ^10.3.1 # access/refresh token storage
  crypto: ^3.0.7                 # PKCE code challenge (SHA-256)
  flutter_map_tile_caching: ^10.1.1
  flutter_local_notifications: ^19.0.0  # "Split-Ticket fertig" OS notification

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

# Flutter launcher icons configuration
flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path_android: "assets/icon/app_icon.png"
  image_path_ios: "assets/icon/app_icon.png"
  adaptive_icon_background: "#EC0016"
  adaptive_icon_foreground: "assets/icon/app_icon.png"
  adaptive_icon_monochrome: "assets/icon/app_icon_monochrome.png"
  web:
    generate: false
  windows:
    generate: false
  macos:
    generate: false

flutter:
  uses-material-design: true

  assets:
    - assets/icon/
    - assets/traewelling/
